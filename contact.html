<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahawa Lounge | Contact</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="c:\Users\Admin\OneDrive\Pictures\coffee.jpeg" alt="Kahawa Lounge logo" class="logo" />
      <span>Kahawa Lounge</span>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-shell contact-shell">
    <section class="contact-grid">
      <div class="contact-info">
        <h1>Visit or Write to Us</h1>
        <p><strong>Kakamega Town</strong></p>
        <p>Open daily 7am–8pm</p>
        <p>Phone: +254 742 305 180</p>
        <p><a href="https://www.google.com/maps/search/?api=1&query=Kakamega+Town+Kenya" target="_blank" rel="noopener">View on Google Maps</a></p>
      </div>
      <div class="contact-form-block">
        <h2>Send a message</h2>
        <form action="https://formsubmit.co/your-email@example.com" method="POST">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>

          <button type="submit" class="button">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Kahawa Lounge. Open daily 7am–8pm in Kakamega Town.</p>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">Facebook</a>
      <a href="#">WhatsApp</a>
    </div>
  </footer>
</body>
</html>
